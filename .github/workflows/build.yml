name: build

# A firmware fordítása minden PR-nél és a main-re pushnál, hogy a CI elbukjon,
# ha a sketch nem fordul. A fordítást a repó build.sh-ja végzi (egyetlen
# igazságforrás a board/FQBN/partíció beállításokhoz).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [c3, c6]   # XIAO ESP32-C3 / ESP32-C6
    steps:
      - uses: actions/checkout@v4

      - name: arduino-cli telepítése
        uses: arduino/setup-arduino-cli@v2

      # Az esp32 core (~300 MB) cache-elése a core verzióhoz kötve.
      - name: ESP32 core cache
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino15-esp32-3.1.3-onebutton-2.6.1

      - name: Toolchain (core + könyvtár)
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.1.3
          arduino-cli lib install OneButton@2.6.1

      - name: Fordítás
        run: TARGET=${{ matrix.target }} ./build.sh
